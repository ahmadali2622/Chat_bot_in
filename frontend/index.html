<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NetSol Chatbot</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --accent: #00b4d8;
    --accent-soft: #0090ad;
    --text: #e6e9ef;
    --text-dim: #8a90a2;
    --bubble-user: #00b4d8;
    --bubble-bot: #1f2430;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 90vh;
    background: var(--panel);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .chat-header {
    padding: 18px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    font-weight: 600;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chat-header .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
  }

  .chat-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.4;
    font-size: 0.95rem;
    word-wrap: break-word;
  }

  .msg.user {
    background: var(--bubble-user);
    color: #00222b;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    background: var(--bubble-bot);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg.typing {
    color: var(--text-dim);
    font-style: italic;
  }

  .chat-input {
    display: flex;
    padding: 12px;
    border-top: 1px solid #232836;
    gap: 8px;
  }

  .chat-input input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #2a2f3d;
    background: #0f1115;
    color: var(--text);
    outline: none;
    font-size: 0.95rem;
  }

  .chat-input input:focus {
    border-color: var(--accent);
  }

  .chat-input button {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #00222b;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .chat-input button:hover {
    background: var(--accent-soft);
    color: #fff;
  }

  .chat-input button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <span class="dot"></span>
    NetSol Assistant
  </div>

  <div class="chat-messages" id="messages">
    <div class="msg bot">Hi! I'm your NetSol assistant. Ask me anything.</div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
  const API_URL = "http://127.0.0.1:8000/chat"; // FastAPI backend URL

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `msg ${sender}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage(text, "user");
    inputEl.value = "";
    sendBtn.disabled = true;

    const typingEl = addMessage("Bot is typing...", "bot typing");

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      typingEl.remove();
      addMessage(data.response, "bot");
    } catch (err) {
      typingEl.remove();
      addMessage("Error: could not reach server. Is the backend running?", "bot");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
